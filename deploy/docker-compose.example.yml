services:
  deepask:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: deepask-live
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: /deepask
      ORGANIZER_CODE: replace-with-real-code
      LLM_PROVIDER: openai
      OPENAI_API_KEY: replace-with-real-key
      OPENAI_MODEL: gpt-4.1-mini
    volumes:
      - deepask-data:/app/data

volumes:
  deepask-data:
